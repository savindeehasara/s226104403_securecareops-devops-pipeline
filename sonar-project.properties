# SecureCareOps SonarQube / SonarCloud configuration

sonar.projectKey=securecareops-devops-pipeline
sonar.projectName=SecureCareOps DevOps Pipeline
sonar.projectVersion=1.0.0

# Source and test folders
sonar.sources=src
sonar.tests=tests

# JavaScript coverage report from Jest
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclude files that should not be analysed as application logic
sonar.exclusions=node_modules/**,coverage/**,reports/**

# Encoding
sonar.sourceEncoding=UTF-8